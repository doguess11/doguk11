<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BT Yönetim Paneli</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <div class="container py-4">
      <h2>BT Yönetim Paneli</h2>
      <ul class="nav nav-tabs" id="myTab" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" id="users-tab" data-bs-toggle="tab" data-bs-target="#users" type="button" role="tab">Kullanıcı Yönetimi</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="switches-tab" data-bs-toggle="tab" data-bs-target="#switches" type="button" role="tab">Switch Yönetimi</button>
        </li>
      </ul>
      <div class="tab-content mt-3">
        <div class="tab-pane fade show active" id="users" role="tabpanel">
          <table class="table table-striped" id="users-table">
            <thead><tr><th>Kullanici Adi</th><th>IP Adresi</th><th>Switch Adı</th><th>Mevcut Hız (Mbps)</th><th>Yeni Hız</th><th>Uygula</th></tr></thead>
            <tbody></tbody>
          </table>
          <button class="btn btn-sm btn-secondary" id="refresh-users">Yenile</button>
          <form id="import-users-form" class="mt-3">
            <h5>Kullanıcı Excel Yükle (IP + İsim Soyisim)</h5>
            <div class="mb-2"><input class="form-control" type="file" name="file" accept=".xlsx" required></div>
            <small class="text-muted">Sadece IP ve kullanıcı adı/soyadı içeren Excel yükleyin. Hız bilgisi otomatik olarak bağlı switch portundan alınır.</small>
            <button class="btn btn-primary mt-2">Excel İçe Aktar</button>
          </form>
        </div>
        <div class="tab-pane fade" id="switches" role="tabpanel">
          <table class="table table-striped" id="switch-table">
            <thead><tr><th>Switch Adı</th><th>IP</th><th>Durum</th></tr></thead>
            <tbody></tbody>
          </table>
          <h5>Yeni Switch Ekle</h5>
          <form id="add-switch-form">
            <div class="mb-2"><input class="form-control" name="name" placeholder="Switch Adı" required></div>
            <div class="mb-2"><input class="form-control" name="ip" placeholder="IP Adresi" required></div>
            <div class="mb-2"><input class="form-control" name="pwd" placeholder="Telnet Şifresi" required></div>
            <button class="btn btn-primary">Ekle</button>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      async function loadUsers(){
        const res = await fetch('/api/users');
        const data = await res.json();
        const tbody = document.querySelector('#users-table tbody');
        tbody.innerHTML = '';
        data.forEach(u=>{
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${u.Kullanici_Adi}</td><td>${u.IP_Adresi}</td><td>${u.Switch_Adi || ''}</td><td>${u.Mevcut_Hiz || ''}</td><td><select class="form-select form-select-sm speed-select"><option value="10">10 Mbps</option><option value="50">50 Mbps</option><option value="unlimited">Sınırsız</option></select></td><td><button class="btn btn-sm btn-success apply-btn">Hızı Uygula</button></td>`;
          tr.querySelector('.apply-btn').addEventListener('click', async ()=>{
            const speed = tr.querySelector('.speed-select').value;
            const body = {kullanici_adi:u.Kullanici_Adi, kullanici_ip:u.IP_Adresi, speed_choice:speed};
            const r = await fetch('/api/apply', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
            if(r.ok) alert('Uygulandı'); else {const e=await r.json(); alert('Hata: '+e.detail)}
            loadUsers();
          });
          tbody.appendChild(tr);
        });
      }

      async function loadSwitches(){
        const res = await fetch('/api/switches');
        const data = await res.json();
        const tbody = document.querySelector('#switch-table tbody');
        tbody.innerHTML = '';
        data.forEach(s=>{
          const tr = document.createElement('tr');
          const badge = s.Online ? '<span class="badge bg-success">Online</span>' : '<span class="badge bg-danger">Offline</span>';
          tr.innerHTML = `<td>${s.Switch_Adi}</td><td>${s.IP_Adresi}</td><td>${badge}</td>`;
          tbody.appendChild(tr);
        });
      }

      document.getElementById('refresh-users').addEventListener('click', loadUsers);
      document.getElementById('import-users-form').addEventListener('submit', async (e)=>{
        e.preventDefault();
        const f = e.target;
        const formData = new FormData(f);
        try{
          const res = await fetch('/api/import_users', {method:'POST', body:formData});
          const json = await res.json().catch(()=>null);
          if(res.ok) {
            alert('Excel yüklendi. Satır sayısı: '+json.rows);
            loadUsers();
            f.reset();
          } else {
            const err = json || {detail:'unknown'};
            console.error('Import users error', err);
            alert('Hata: '+(err.detail||'Unknown'))
          }
        }catch(ex){
          console.error('Network error importing users', ex);
          alert('Ağ hatası: '+ex.message)
        }
      });
      document.getElementById('add-switch-form').addEventListener('submit', async (e)=>{
        e.preventDefault();
        const f = e.target;
        const formData = new FormData(f);
        try{
          const res = await fetch('/api/add_switch', {method:'POST', body:formData});
          const json = await res.json().catch(()=>null);
          if(res.ok) {
            let msg = 'Switch eklendi';
            if(json){
              if(json.telnet_ok) msg += ' — Telnet bağlantısı başarılı';
              else msg += ' — Telnet bağlantısı başarısız: '+(json.telnet_msg||'');
            }
            alert(msg);
            loadSwitches();
            f.reset();
          } else {
            const err = json || {detail:'unknown'};
            console.error('Add switch error', err);
            alert('Hata: '+(err.detail||'Unknown'))
          }
        }catch(ex){
          console.error('Network error adding switch', ex);
          alert('Ağ hatası: '+ex.message)
        }
      });

      loadUsers();
      loadSwitches();
    </script>
  </body>
</html>
